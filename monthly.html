<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月別集計</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

select {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin: 10px 0;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background-color: #4CAF50;
  color: white;
}

.nav {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.nav a {
  flex: 1;
}

.card {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="nav">
  <a href="index.html"><button>入力</button></a>
</div>

<h2>月別集計</h2>

<select id="month"></select>

<div id="result"></div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzKHsxbEnKuwEmo4yYHxPBi-VB3LyDqAatyFJAZE7rYl8WTcB6kD_W5py-Nhiv5GsiwFw/exec";

fetch(url)
  .then(res => res.json())
  .then(data => {
    const months = {};

    data.slice(1).forEach(row => {
      const date = new Date(row[0]);
      const month = date.getMonth() + 1;
      
      if (!months[month]) {
        months[month] = {
          eating_out: 0,
          cooking: 0,
          electric: 0,
          gas: 0,
          water: 0,
          hobby_me: 0,
          hobby_partner: 0,
          salary: 0
        };
      }
      
      months[month].eating_out += Number(row[1]) || 0;
      months[month].cooking += Number(row[2]) || 0;
      months[month].electric += Number(row[5]) || 0;
      months[month].gas += Number(row[6]) || 0;
      months[month].water += Number(row[7]) || 0;
      months[month].hobby_me += Number(row[8]) || 0;
      months[month].hobby_partner += Number(row[9]) || 0;
      months[month].salary += Number(row[10]) || 0;
    });

    const select = document.getElementById("month");

    Object.keys(months).forEach(m => {
      const opt = document.createElement("option");
      opt.value = m;
      opt.text = m + "月";
      select.appendChild(opt);
    });

    select.addEventListener("change", () => {
      const m = select.value;
      const d = months[m];

      const eating = Number(d.eating_out) + Number(d.cooking);
      const utility = Number(d.electric) + Number(d.gas) + Number(d.water);
      const hobby_total = Number(d.hobby_me) + Number(d.hobby_partner);

      const total = eating + utility + hobby_total;
      const income = Number(d.salary) || 0;
      const balance = income - total;

      document.getElementById("result").innerHTML = `
        <div class="card">
        <p>外食: ${d.eating_out}円</p>
        <p>自炊: ${d.cooking}円</p>
        <p><b>食費: ${eating}円</b></p>
        <hr>
        <p>電気: ${d.electric}円</p>
        <p>ガス: ${d.gas}円</p>
        <p>水道: ${d.water}円</p>
        <p><b>光熱費: ${utility}円</b></p>
        <hr>
        <p>趣味（自分）: ${d.hobby_me}円</p>
        <p>趣味（彼女）: ${d.hobby_partner}円</p>
        <p><b>趣味（合算）: ${hobby_total}円</b></p>
        <hr>
        <h3>合計: ${total}円</h3>
        <hr>
        <p><b>給与: ${income}円</b></p>
        <p><b>収支: ${balance}円</b></p>
        </div>
      `;
    });

    select.dispatchEvent(new Event("change"));
  });
</script>

</body>
</html>
