<h2>月別集計</h2>

<select id="month"></select>

<div id="result"></div>

<script>
salary: 0
const url = "https://script.google.com/macros/s/AKfycbxN0jknW9HB83oiMrsFg83WLQ8J9eqfMjnnfNtdClzd9lqbmCeFdaLl-rjshX1SzY4KpQ/exec";

fetch(url)
  .then(res => res.json())
  .then(data => {
    const months = {};

    data.slice(1).forEach(row => {
      const date = row[0];
      const month = date.split("/")[0];

      if (!months[month]) {
        months[month] = {
          eating_out: 0,
          cooking: 0,
          electric: 0,
          gas: 0,
          water: 0,
          hobby_me: 0,
          hobby_partner: 0
        };
      }

      months[month].eating_out += Number(row[1]) || 0;
      months[month].cooking += Number(row[2]) || 0;
      months[month].electric += Number(row[5]) || 0;
      months[month].gas += Number(row[6]) || 0;
      months[month].water += Number(row[7]) || 0;
      months[month].hobby_me += Number(row[8]) || 0;
      months[month].hobby_partner += Number(row[9]) || 0;
      months[month].salary += Number(row[10]) || 0;
    });

    const select = document.getElementById("month");

    Object.keys(months).forEach(m => {
      const opt = document.createElement("option");
      opt.value = m;
      opt.text = m + "月";
      select.appendChild(opt);
    });

    select.addEventListener("change", () => {
      const m = select.value;
      const d = months[m];

      const eating = d.eating_out + d.cooking;
      const utility = d.electric + d.gas + d.water;
      const hobby_total = d.hobby_me + d.hobby_partner; // ←追加
      const total = eating + utility + hobby_total;
      const income = d.salary;
      const balance = income - total;

      document.getElementById("result").innerHTML = `
        <p>外食: ${d.eating_out}円</p>
        <p>自炊: ${d.cooking}円</p>
        <p><b>食費: ${eating}円</b></p>
        <hr>
        <p>電気: ${d.electric}円</p>
        <p>ガス: ${d.gas}円</p>
        <p>水道: ${d.water}円</p>
        <p><b>光熱費: ${utility}円</b></p>
        <hr>
        <p>趣味（自分）: ${d.hobby_me}円</p>
        <p>趣味（彼女）: ${d.hobby_partner}円</p>
        <p><b>趣味（合算）: ${hobby_total}円</b></p>
        <hr>
        <h3>合計: ${total}円</h3>
        <hr>
        <p><b>給与: ${income}円</b></p>
        <p><b>収支: ${balance}円</b></p>
      `;
    });

    select.dispatchEvent(new Event("change"));
  });
</script>
