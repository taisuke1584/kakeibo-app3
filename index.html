<h2>家計簿</h2>

<input type="number" id="eating_out" placeholder="外食費">
<input type="number" id="cooking" placeholder="自炊費">

<button id="sendBtn" type="button">送信</button>

<script>
document.getElementById("sendBtn").addEventListener("click", sendData);

function sendData(event) {
  event.preventDefault();
  e.stopPropagation();

  const url = "https://script.google.com/macros/s/AKfycbxqU8bd4H6pUtH8mgwNcQ9BlGZbT0lcdB4lODBIq3yiuOY7H8W7Buha0gavm4W_uJcDHw/exec";

  const eat = document.getElementById("eating_out");
  const cook = document.getElementById("cooking");

  const data = {
    eating_out: eat.value || 0,
    cooking: cook.value || 0
  };

  fetch(url, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  eat.value = "";
  cook.value = "";

  alert("送信しました");
}
</script>
