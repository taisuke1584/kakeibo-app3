<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>家計簿</h2>
<a href="monthly.html">
  <button>月別を見る</button>
</a>

<input type="number" placeholder="外食費" id="eating_out">
<input type="number" placeholder="自炊費" id="cooking">
<input type="number" placeholder="ガソリン代" id="gasoline">
<input type="number" placeholder="ガソリン（円/L）" id="gasoline_liter">
<input type="number" placeholder="電気代" id="electric">
<input type="number" placeholder="ガス代" id="gas">
<input type="number" placeholder="水道代" id="water">
<input type="number" placeholder="趣味（自分）" id="hobby_me">
<input type="number" placeholder="趣味（彼女）" id="hobby_partner">
<input type="number" placeholder="給与" id="salary">

<button onclick="sendData()">送信</button>

<script>
function sendData() {
  const url = "https://script.google.com/macros/s/AKfycbzKHsxbEnKuwEmo4yYHxPBi-VB3LyDqAatyFJAZE7rYl8WTcB6kD_W5py-Nhiv5GsiwFw/exec";

  const data = {
    eating_out: document.getElementById("eating_out").value || 0,
    cooking: document.getElementById("cooking").value || 0,
    gasoline: document.getElementById("gasoline").value || 0,
    gasoline_liter: document.getElementById("gasoline_liter").value || 0,
    electric: document.getElementById("electric").value || 0,
    gas: document.getElementById("gas").value || 0,
    water: document.getElementById("water").value || 0,
    hobby_me: document.getElementById("hobby_me").value || 0,
    hobby_partner: document.getElementById("hobby_partner").value || 0,
    salary: document.getElementById("salary").value || 0
  };

  fetch(url, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  document.querySelectorAll("input").forEach(i => i.value = "");

  alert("送信しました");
}
</script>
  
</body>
</html>
