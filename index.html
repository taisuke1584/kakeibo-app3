<form action="https://script.google.com/macros/s/AKfycbxLsaI5e_xecCtS4fQv-K8WCZdxAT8sG68aEt7y4x-SwtUrOn6JxEJfMzFruNDi5SuYoA/exec" method="POST" onsubmit="return setDefault()">
  <input type="number" id="eating_out" name="eating_out" placeholder="外食費">
  <input type="number" id="cooking" name="cooking" placeholder="自炊費">
  <button type="submit">送信</button>
</form>

<script>
function setDefault() {
  const eat = document.getElementById("eating_out");
  const cook = document.getElementById("cooking");

  if (eat.value === "") eat.value = 0;
  if (cook.value === "") cook.value = 0;

  return true;
}
</script>
