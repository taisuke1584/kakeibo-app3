<h2>家計簿</h2>

<input type="number" id="eating_out" placeholder="外食費">
<input type="number" id="cooking" placeholder="自炊費">

<button type="button" onclick="sendData()">送信</button>

<script>
function sendData() {
  const url = "https://script.google.com/macros/s/AKfycbxhgRfxkTFn2uncx2W7YYcKwLRyCRsetBiMJRnivgYigEziv6PYhCPtmvGAn5KQlAGlvA/exec";

  const eat = document.getElementById("eating_out");
  const cook = document.getElementById("cooking");

  const data = {
    eating_out: eat.value || 0,
    cooking: cook.value || 0
  };

  fetch(url, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  eat.value = "";
  cook.value = "";

  alert("送信しました");
}
</script>
